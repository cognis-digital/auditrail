apiVersion: apps/v1
kind: Deployment
metadata: { name: auditrail, labels: { app: auditrail } }
spec:
  replicas: 1
  selector: { matchLabels: { app: auditrail } }
  template:
    metadata: { labels: { app: auditrail } }
    spec:
      containers:
        - name: auditrail
          image: ghcr.io/cognis-digital/auditrail:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: auditrail }
spec:
  selector: { app: auditrail }
  ports: [{ port: 80, targetPort: 8000 }]
